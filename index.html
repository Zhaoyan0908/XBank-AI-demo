<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>R-Radar 风险雷达 · Team G</title>
<!--
  Team G · R³ 治理魔方 · R-Radar（风险雷达）v2 深色科技演示版
  坐标：X2-Y1-Z1（事中动态管控 × 战略协作 × 管理决策层）
  方法论：R = (E×P×I)^(1/3)；拨备 = 业务规模(亿元)×等级系数×(R/80)，输出万元/年
  默认下钻：公平性 × 信贷审批 R=91；隐私 T × 智能客服 演示中等风险 72 分
-->
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style id="v2-dark">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
:root {
  /* 底色:深海蓝黑 -> 深蓝 -> 蓝青,对齐工具二 X-Explain */
  --bg0: #020713;
  --bg1: #061423;
  --bg2: #041d25;
  --bg-grad: linear-gradient(135deg, var(--bg0), var(--bg1) 45%, var(--bg2));

  /* 卡片与边线 */
  --card: rgba(9, 25, 43, 0.76);
  --panel: rgba(11, 31, 53, 0.80);
  --border: rgba(84, 166, 210, 0.23);
  --border-hover: rgba(84, 166, 210, 0.45);
  --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);

  /* 文字 */
  --text: #edf7ff;
  --text-sub: #8ea8bd;
  --text-hint: #6e8a9e;

  /* 强调色:蓝青为主,Deloitte 绿为点缀 */
  --cyan: #22d3ee;
  --blue: #2f8cff;
  --lime: #86BC25;
  --mint: #36d17c;
  --green: #36d17c;

  /* 风险三色 */
  --risk-h: #ff5f68;
  --risk-m: #ffb257;
  --risk-l: #36d17c;

  /* 网格底纹 */
  --grid-line: rgba(255, 255, 255, 0.06);

  --font-zh: "Microsoft YaHei", "微软雅黑", Inter, sans-serif;
  --font-num: Inter, "SF Pro Display", "Microsoft YaHei", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { min-height: 100%; }
body {
  font-family: var(--font-zh);
  color: var(--text);
  background:
    radial-gradient(circle at 82% 4%, rgba(134,188,37,0.34), transparent 28%),
    radial-gradient(circle at 12% 8%, rgba(47,140,255,0.30), transparent 22%),
    var(--bg-grad);
  background-attachment: fixed;
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
}
body::before {
  content: "";
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  opacity: 0.20;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 46px 46px;
  -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,.95), rgba(0,0,0,.35), transparent);
  mask-image: linear-gradient(to bottom, rgba(0,0,0,.95), rgba(0,0,0,.35), transparent);
}
.page-wrap { position: relative; z-index: 1; max-width: 1600px; margin: 0 auto; padding: 20px 24px 48px; }
.en { font-family: Inter, Arial, sans-serif; }
.btn-demo {
  position: fixed; top: 20px; right: 24px; z-index: 100;
  padding: 10px 16px; font-size: 12px; font-weight: 900; letter-spacing: 0.06em;
  color: #eaf7ff;
  background: linear-gradient(135deg, #087ed8, #16c7e2 48%, #80b921);
  border: none; border-radius: 12px; cursor: pointer;
  font-family: inherit;
  box-shadow: 0 14px 34px rgba(34,211,238,0.18);
  transition: transform 0.2s, filter 0.2s, box-shadow 0.3s;
}
.btn-demo:hover {
  transform: translateY(-1px);
  filter: brightness(1.08);
  box-shadow: 0 18px 40px rgba(34,211,238,0.28);
}
.btn-demo.running { animation: demoBtnPulse 1.2s ease infinite; }
@keyframes demoBtnPulse { 50% { box-shadow: 0 0 28px rgba(134,188,37,0.5); } }
.hero-v2 {
  position: relative; border-radius: 18px;
  border: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(15,44,70,0.68), rgba(6,22,39,0.62));
  box-shadow: var(--shadow);
  overflow: hidden;
  padding: 24px 28px; margin-bottom: 16px;
  display: flex; justify-content: space-between; align-items: center; gap: 24px; flex-wrap: wrap;
}
.hero-v2::before {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(circle at 76% 18%, rgba(34,211,238,0.18), transparent 50%),
    radial-gradient(circle at 8% 90%, rgba(134,188,37,0.10), transparent 45%);
}
.hero-v2::after {
  content: ""; position: absolute; inset: 0; pointer-events: none; opacity: 0.4;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 28px 28px;
  -webkit-mask-image: linear-gradient(to bottom right, rgba(0,0,0,.8), transparent 70%);
  mask-image: linear-gradient(to bottom right, rgba(0,0,0,.8), transparent 70%);
}
.hero-brand { display: flex; gap: 16px; align-items: center; position: relative; z-index: 1; }
.logo-wrap {
  position: relative;
  width: 92px; height: 92px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.logo-wrap .logo-img {
  width: 92px; height: 92px; object-fit: contain; display: block;
  filter:
    drop-shadow(0 0 18px rgba(34, 211, 238, 0.28))
    drop-shadow(0 0 12px rgba(134, 188, 37, 0.16));
}
.logo-wrap .rradar-logo {
  transform: translateY(1px);
}
.logo-wrap .logo-svg-fallback {
  width: 70%; height: 70%; display: none;
}
.hero-titles .name-en {
  font-family: var(--font-num); font-size: 44px; font-weight: 900;
  letter-spacing: -0.045em; line-height: 1.05;
  background: linear-gradient(90deg, #eaf7ff 0%, #2de1ff 28%, #86BC25 70%, #f6ffe3 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.hero-titles .name-zh { font-size: 18px; color: var(--cyan); letter-spacing: 6px; margin-top: 6px; font-weight: 500; }
.hero-titles .sub, .hero-titles .slogan { font-size: 13px; color: var(--text-sub); margin-top: 8px; }
.hero-titles .slogan { color: rgba(232,241,248,0.85); font-weight: 500; }
.hero-kpis { display: flex; gap: 12px; flex-wrap: wrap; position: relative; z-index: 1; }
.hero-kpi {
  min-width: 130px;
  padding: 12px 18px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: linear-gradient(180deg, rgba(15,44,70,0.45), rgba(6,22,39,0.45));
  position: relative;
  overflow: hidden;
}
.hero-kpi::before {
  content: ""; position: absolute; right: -38px; top: -54px;
  width: 146px; height: 146px; border-radius: 50%;
  background: radial-gradient(circle, rgba(34,211,238,0.18), transparent 62%);
  pointer-events: none;
}
.hero-kpi.kpi-high::before { background: radial-gradient(circle, rgba(255,95,104,0.18), transparent 62%); }
.hero-kpi.kpi-reserve::before { background: radial-gradient(circle, rgba(134,188,37,0.18), transparent 62%); }
.hero-kpi .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-hint); display: flex; align-items: center; gap: 8px; font-weight: 800; position: relative; }
.pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulseDot 1.8s ease-in-out infinite; }
@keyframes pulseDot { 0%,100% { opacity: 0.35; transform: scale(0.85); } 50% { opacity: 1; transform: scale(1.15); } }
.hero-kpi .val {
  font-family: var(--font-num); font-size: 36px; font-weight: 900;
  letter-spacing: -0.04em; margin-top: 4px; font-variant-numeric: tabular-nums;
  text-shadow: 0 0 12px currentColor;
  position: relative;
}
.hero-kpi .unit { font-size: 11px; color: var(--text-hint); margin-top: 2px; position: relative; }
.hero-kpi.kpi-total .val { color: var(--cyan); }
.hero-kpi.kpi-total .lbl { color: var(--cyan); }
.hero-kpi.kpi-high .val, .hero-kpi.kpi-high .lbl { color: var(--risk-h); }
.hero-kpi.kpi-reserve .val, .hero-kpi.kpi-reserve .lbl { color: var(--lime); }
.shell { padding: 0; }
.grid-main { display: grid; grid-template-columns: 280px 1fr 420px; gap: 14px; align-items: start; }
@media (max-width: 1100px) {
  .grid-main { grid-template-columns: 1fr; }
  .hero-v2 { flex-direction: column; align-items: flex-start; }
  .btn-demo { position: static; margin-bottom: 12px; width: 100%; text-align: center; }
}
.panel {
  background: linear-gradient(180deg, rgba(11,31,53,0.80), rgba(6,21,37,0.72));
  border: 1px solid var(--border); border-radius: 14px;
  box-shadow: var(--shadow);
  position: relative;
  transition: border-color 0.25s;
}
.panel::before {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  border-radius: inherit;
  background: linear-gradient(115deg, rgba(255,255,255,0.04), transparent 28%, transparent 70%, rgba(134,188,37,0.04));
}
.panel:hover { border-color: var(--border-hover); }
.panel-h { padding: 10px 14px; border-bottom: 1px solid var(--border); font-weight: 700; color: var(--cyan); font-size: 12px; letter-spacing: 0.04em; position: relative; }
.panel-b { padding: 12px 14px; color: var(--text-sub); position: relative; }
.filter-block { margin-bottom: 14px; }
.filter-title { font-size: 11px; font-weight: 700; color: var(--cyan); margin-bottom: 6px; text-transform: uppercase; }
.filter-title small { color: var(--text-sub); margin-left: 6px; text-transform: none; }
.filter-actions { font-size: 11px; margin-bottom: 6px; }
.filter-actions a { color: var(--mint); cursor: pointer; margin-right: 10px; }
.filter-actions a:hover { color: var(--lime); }
.chk-list label { display: flex; align-items: center; gap: 6px; padding: 4px 0; cursor: pointer; font-size: 12px; color: var(--text); }
.chk-list input { accent-color: var(--mint); }
.chk-list .cnt { color: var(--text-hint); }
.reset-bar { margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--border); }
.btn {
  display: inline-block; padding: 7px 14px; border: 1px solid rgba(34,211,238,0.35);
  background: rgba(7,20,33,0.5); color: var(--mint); font-size: 12px; cursor: pointer;
  font-family: inherit; border-radius: 4px; transition: box-shadow 0.25s, border-color 0.25s;
}
.btn:hover { border-color: var(--lime); box-shadow: 0 0 16px rgba(34,211,238,0.25); }
.btn-primary { background: rgba(34,211,238,0.12); border-color: var(--mint); color: var(--mint); font-weight: 700; }
.tabs, .rtabs { display: flex; border-bottom: 1px solid var(--border); background: rgba(7,20,33,0.4); }
.tabs button, .rtabs button {
  flex: 1; padding: 9px 6px; border: none; background: transparent; cursor: pointer;
  font-size: 12px; color: var(--text-hint); font-family: inherit;
  border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s;
}
.tabs button.active, .rtabs button.active {
  color: var(--mint); font-weight: 700; border-bottom-color: var(--lime);
  background: rgba(34,211,238,0.06);
}
.viz-body { padding: 14px; min-height: 420px; position: relative; }
.empty-viz {
  position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
  background: rgba(7,20,33,0.88); text-align: center; padding: 24px; z-index: 5; color: var(--text);
}
.empty-viz.show { display: flex; }
.empty-viz strong { color: var(--mint); display: block; margin-bottom: 8px; font-size: 16px; }
.heat-wrap { overflow-x: auto; }
.heat-table { display: grid; gap: 8px; min-width: 520px; }
.heat-corner {
  background: rgba(47,140,255,0.12); color: var(--cyan); font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; padding: 8px; border-radius: 4px; border: 1px solid var(--border);
}
.heat-col-h, .heat-row-h {
  background: rgba(7,20,33,0.75); color: var(--text-sub); font-weight: 600; font-size: 11px;
  text-align: center; padding: 8px 6px; border: 1px solid var(--border); border-radius: 4px;
}
.heat-row-h { display: flex; align-items: center; justify-content: center; flex-direction: column; }
.heat-cell {
  border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 12px 10px;
  cursor: pointer; position: relative; min-height: 88px;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
}
.heat-cell:hover { transform: translateY(-2px); border-color: var(--border-hover); }
.heat-cell.selected, .heat-cell.demo-spotlight {
  border: 2px solid var(--cyan) !important;
  box-shadow: 0 0 18px rgba(34,211,238,0.45), inset 0 0 24px rgba(34,211,238,0.08);
}
.heat-cell.demo-spotlight { box-shadow: 0 0 24px rgba(34,211,238,0.55), 0 0 48px rgba(134,188,37,0.20); }
.heat-cell.level-H { animation: riskPulse 1.8s ease-in-out infinite; }
@keyframes riskPulse {
  0%, 100% { opacity: 0.94; box-shadow: 0 0 10px rgba(255,95,104,0.25); }
  50% { opacity: 1; box-shadow: 0 0 16px rgba(255,95,104,0.40); }
}
.heat-cell.empty { background: rgba(7,20,33,0.5) !important; cursor: default; color: var(--text-hint); }
.heat-cell.empty:hover { transform: none; box-shadow: none; }
.heat-big { font-family: var(--font-num); font-size: 20px; font-weight: 700; color: #fff; line-height: 1.1; letter-spacing: -0.03em; }
.heat-tag { font-size: 10px; font-weight: 700; margin-top: 6px; letter-spacing: 0.05em; }
.heat-tag.H { color: var(--risk-h); }
.heat-tag.M { color: var(--risk-m); }
.heat-tag.L { color: var(--risk-l); }
.heat-meta { font-size: 10px; color: var(--text-hint); margin-top: 4px; }
.star { position: absolute; top: 6px; right: 8px; color: var(--lime); font-size: 14px; text-shadow: 0 0 8px var(--lime); }
.chart-box { width: 100%; height: 380px; display: none; }
.chart-box.show { display: block; }
.legend-bar {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  padding: 10px 14px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-sub);
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.sq { width: 12px; height: 12px; border-radius: 2px; }
.sq.H { background: var(--risk-h); box-shadow: 0 0 8px var(--risk-h); }
.sq.M { background: var(--risk-m); }
.sq.L { background: var(--risk-l); }
.insight { margin-left: auto; max-width: 480px; color: var(--mint); font-weight: 600; }
.detail-score {
  font-family: var(--font-num); font-size: 44px; font-weight: 900;
  letter-spacing: -0.04em; line-height: 1;
  text-shadow: 0 0 12px currentColor;
}
.detail-score.score-H { color: var(--risk-h); }
.detail-score.score-M { color: var(--risk-m); }
.detail-score.score-L { color: var(--risk-l); }
.tag-level {
  display: inline-block; padding: 3px 12px; font-size: 11px; font-weight: 700;
  color: #071421; margin-top: 10px; border-radius: 2px; letter-spacing: 0.06em;
}
.tag-level.H { background: var(--risk-h); color: #fff; box-shadow: 0 0 12px rgba(255,90,95,0.5); }
.tag-level.M { background: var(--risk-m); color: #071421; }
.tag-level.L { background: var(--risk-l); color: #071421; }
.radar-chart { width: 100%; height: 220px; margin: 8px 0 4px; }
.factor-row { margin-top: 10px; }
.factor-top { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text); }
.badge-e {
  width: 22px; height: 22px; border-radius: 50%; background: rgba(47,140,255,0.25);
  color: var(--cyan); border: 1px solid rgba(47,140,255,0.4);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; margin-right: 6px;
}
.bar-track { height: 6px; background: rgba(47,140,255,0.1); border-radius: 3px; margin-top: 6px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--mint)); transition: width 0.35s ease; border-radius: 3px; }
.section-title { font-size: 11px; font-weight: 700; color: var(--cyan); margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.08em; }
.detail-body p { color: var(--text-sub); font-size: 12px; }
.bullets { color: var(--text-sub); padding-left: 0; list-style: none; }
.bullets li { margin-bottom: 6px; font-size: 12px; }
.bullets li::before { content: "▸ "; color: var(--mint); }
.cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.cloud span {
  border: 1px solid rgba(47,140,255,0.25); padding: 3px 10px; font-size: 11px;
  background: rgba(47,140,255,0.08); color: var(--text-sub); border-radius: 2px;
}
.reserve-big {
  font-family: var(--font-num); font-size: 36px; font-weight: 900; color: var(--lime); margin-top: 6px;
  letter-spacing: -0.04em;
  text-shadow: 0 0 12px rgba(134,188,37,0.45);
}
.formula-note { font-size: 11px; color: var(--text-hint); margin-top: 6px; }
.calc-grid { display: grid; gap: 10px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--text-sub); margin-bottom: 4px; }
.field input[type="text"], .field select {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border);
  background: rgba(7,20,33,0.8); color: var(--text); font-family: inherit; border-radius: 4px;
}
.field input[type="range"] { width: 100%; accent-color: var(--mint); }
.range-val { float: right; font-weight: 700; color: var(--mint); font-family: var(--font-num); }
.subgroup { border: 1px solid var(--border); padding: 12px; border-radius: 6px; background: rgba(7,20,33,0.45); }
.subgroup h4 { font-size: 11px; color: var(--cyan); margin-bottom: 8px; text-transform: uppercase; }
.quick-btns button { margin-right: 6px; margin-top: 4px; }
.out-box { border: 1px solid rgba(34,211,238,0.3); padding: 14px; margin-top: 10px; border-radius: 8px; background: rgba(34,211,238,0.06); }
#out-r {
  font-family: var(--font-num); font-size: 42px; font-weight: 900; line-height: 1;
  letter-spacing: -0.04em; text-shadow: 0 0 12px currentColor;
}
.mini-chart { width: 100%; height: 160px; margin-top: 8px; }
.bottom-panel { margin-top: 14px; }
.bottom-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; cursor: pointer; border-radius: 8px 8px 0 0;
  background: rgba(47,140,255,0.1); border: 1px solid var(--border); color: var(--text);
}
.bottom-head h3 { font-size: 13px; font-weight: 600; color: var(--mint); }

.table-wrap { overflow-x: auto; }

.lvl-dot { font-weight: 800; font-family: var(--font-num); }
.lvl-dot.H { color: var(--risk-h); }
.lvl-dot.M { color: var(--risk-m); }
.lvl-dot.L { color: var(--risk-l); }
.num-r { font-family: var(--font-num); font-weight: 700; }

  font-size: 11px; padding: 4px 10px; border-radius: 4px;

<body>
<button type="button" class="btn-demo en" id="btn-demo">▶ DEMO MODE</button>
<div class="page-wrap">
<header class="hero-v2">

<script>
(function () {
  'use strict';

  var LS_KEY = 'rradar-risk-v2';

  var C = {
    riskH: '#ff5f68', riskM: '#ffb257', riskL: '#36d17c',
    mint: '#36d17c', lime: '#86BC25', cyan: '#22d3ee', blue: '#2f8cff',
    text: '#edf7ff', textSub: '#8ea8bd', textHint: '#6e8a9e'
  };

  var BUSINESS_LINES = ['智能客服', '信贷审批', '客户画像', '反欺诈', '投顾推荐'];
  var REGIONS = ['华北', '华东', '华南', '华中', '西部'];
  var MODEL_TYPES = ['传统ML', '深度学习', 'LLM大模型', '多模态', 'Agent'];
  var RISK_TYPES = [
    { key: 'F', label: '公平性', code: 'F' },
    { key: 'E', label: '可解释性', code: 'E' },
    { key: 'T', label: '隐私', code: 'T' },
    { key: 'A', label: '合规问责', code: 'A' }
  ];
  var RISK_TYPE_KEYS = RISK_TYPES.map(function (x) { return x.key; });

  function clamp(n, a, b) { return Math.max(a, Math.min(b, n)); }

  /** 子项归一化到 0–100 */
  function normFreq(v) { return clamp((v / 10000000) * 100, 0, 100); }
  function normCoverage(v) { return clamp((v / 100000000) * 100, 0, 100); }
  function normAmountWan(v) { return clamp((v / 1000) * 100, 0, 100); }

  function computeE(m) {
    return 0.4 * normFreq(m.E_freq) + 0.4 * normCoverage(m.E_coverage) + 0.2 * normAmountWan(m.E_amount);
  }
  function computeP(m) {
    return 0.4 * m.P_history + 0.3 * m.P_bias + 0.3 * m.P_regulation;
  }
  function computeI(m) {
    return 0.4 * m.I_fine + 0.3 * m.I_ltv + 0.2 * m.I_reputation + 0.1 * m.I_remediation;
  }
  function computeR(E, P, I) {
    var x = Math.max(0, E) * Math.max(0, P) * Math.max(0, I);
    return Math.pow(x, 1 / 3);
  }
  function levelFromR(R) {
    if (R >= 80) return 'H';
    if (R >= 60) return 'M';
    return 'L';
  }
  function reserveCoef(lv) {
    if (lv === 'H') return 0.025;
    if (lv === 'M') return 0.012;
    return 0.003;
  }
  /** 拨备（万元/年）= 规模(亿)×系数×(R/80)×10000 */
  function capitalReserve(scaleYi, R, lv) {
    var adj = R / 80;
    return scaleYi * reserveCoef(lv) * adj * 10000;
  }

  function enrichModel(m) {
    var E = computeE(m);
    var P = computeP(m);
    var I = computeI(m);
    var R = computeR(E, P, I);
    var lv = levelFromR(R);
    var cap = capitalReserve(m.scale, R, lv);
    return {
      E_score: E, P_score: P, I_score: I, R_score: R, level: lv, capitalReserve: cap
    };
  }

  function fullModel(m) {
    var e = enrichModel(m);
    var o = {};
    for (var k in m) o[k] = m[k];
    o.E_score = e.E_score; o.P_score = e.P_score; o.I_score = e.I_score;
    o.R_score = e.R_score; o.level = e.level; o.capitalReserve = e.capitalReserve;
    return o;
  }

  /** 预设 12 模型：子项均设为同一目标分，使 E=P=I=目标R，几何平均=R */
  function makePreset(id, name, bl, region, mt, rtKey, targetR, scale) {
    var t = targetR;
    return fullModel({
      id: id,
      name: name,
      businessLine: bl,
      region: region,
      modelType: mt,
      riskType: rtKey,
      scale: scale,
      E_freq: (t / 100) * 10000000,
      E_coverage: (t / 100) * 100000000,
      E_amount: (t / 100) * 1000,
      P_history: t, P_bias: t, P_regulation: t,
      I_fine: t, I_ltv: t, I_reputation: t, I_remediation: t
    });
  }

  var TARGETS = [
    62, 91, 84,
    38, 86, 54,
    72, 58, 79,
    61, 82, 66
  ];
  var BL_ORDER = ['智能客服', '信贷审批', '客户画像'];
  var RT_ORDER = ['F', 'E', 'T', 'A'];

  function buildPresets() {
    var list = [];
    var names = [
      '客服话术公平监测', '信贷反歧视评分', '画像标签公平审计',
      '客服话术可解释', '信贷决策路径解释', '画像特征贡献解释',
      '客服对话隐私脱敏', '信贷数据最小化', '画像授权链路追踪',
      '客服投诉问责路由', '信贷责任链追踪', '画像第三方问责'
    ];
    var regs = ['华北', '华东', '华南', '华中', '西部', '华北', '华东', '华南', '华中', '西部', '华北', '华东'];
    var mts = ['LLM大模型', '传统ML', '深度学习', 'Agent', '多模态', 'LLM大模型', '传统ML', '深度学习', 'Agent', '多模态', 'LLM大模型', '传统ML'];
    var scales = [1.2, 4.5, 2.8, 0.9, 5.2, 3.1, 2.0, 4.0, 1.5, 0.8, 3.6, 2.2];
    var idx = 0;
    for (var r = 0; r < RT_ORDER.length; r++) {
      for (var b = 0; b < BL_ORDER.length; b++) {
        var rt = RT_ORDER[r];
        var bl = BL_ORDER[b];
        list.push(makePreset(
          'M' + String(idx + 1).padStart(3, '0'),
          names[idx],
          bl,
          regs[idx],
          mts[idx],
          rt,
          TARGETS[idx],
          scales[idx]
        ));
        idx++;
      }
    }
    return list;
  }

  var PRESETS = buildPresets();

  var state = {
    models: [],
    filters: {},
    selectedCellKey: 'F|信贷审批',
    selectedModelId: null,
    editingId: null,
    midTab: 'heat',
    rightTab: 'detail',
    tableSort: { key: 'R_score', dir: 'desc' },
    bottomOpen: false,
    demoRunning: false,
    anim: { total: 0, high: 0, reserve: 0 }
  };

  function initFiltersState() {
    state.filters = {
      businessLine: BUSINESS_LINES.slice(),
      region: REGIONS.slice(),
      modelType: MODEL_TYPES.slice(),
      riskType: RISK_TYPE_KEYS.slice(),
      level: ['H', 'M', 'L']
    };
  }

  function loadModels() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (!raw) return PRESETS.map(function (m) { return JSON.parse(JSON.stringify(m)); });
      var arr = JSON.parse(raw);
      if (!Array.isArray(arr) || !arr.length) return PRESETS.map(function (m) { return JSON.parse(JSON.stringify(m)); });
      return arr.map(function (m) { return fullModel(m); });
    } catch (e) {
      return PRESETS.map(function (m) { return JSON.parse(JSON.stringify(m)); });
    }
  }

  function saveModels() {
    localStorage.setItem(LS_KEY, JSON.stringify(state.models));
  }

  function getFilteredModels() {
    return state.models.filter(function (m) {
      if (state.filters.businessLine.length && state.filters.businessLine.indexOf(m.businessLine) === -1) return false;
      if (state.filters.region.length && state.filters.region.indexOf(m.region) === -1) return false;
      if (state.filters.modelType.length && state.filters.modelType.indexOf(m.modelType) === -1) return false;
      if (state.filters.riskType.length && state.filters.riskType.indexOf(m.riskType) === -1) return false;
      if (state.filters.level.length && state.filters.level.indexOf(m.level) === -1) return false;
      return true;
    });
  }

  function countForGroup(dim, value) {
    var others = state.models.filter(function (m) {
      if (dim !== 'businessLine' && state.filters.businessLine.length && state.filters.businessLine.indexOf(m.businessLine) === -1) return false;
      if (dim !== 'region' && state.filters.region.length && state.filters.region.indexOf(m.region) === -1) return false;
      if (dim !== 'modelType' && state.filters.modelType.length && state.filters.modelType.indexOf(m.modelType) === -1) return false;
      if (dim !== 'riskType' && state.filters.riskType.length && state.filters.riskType.indexOf(m.riskType) === -1) return false;
      if (dim !== 'level' && state.filters.level.length && state.filters.level.indexOf(m.level) === -1) return false;
      return true;
    });
    return others.filter(function (m) { return m[dim] === value; }).length;
  }

    var blocks = [
      { dim: 'businessLine', title: 'BUSINESS LINE', zh: '业务线', opts: BUSINESS_LINES },
      { dim: 'region', title: 'REGION', zh: '地区', opts: REGIONS },

        return { v: k, lab: rt.label + ' ' + k };
      }) },
      { dim: 'level', title: 'RISK LEVEL', zh: '风险等级', opts: [
        { v: 'H', lab: '高 H' }, { v: 'M', lab: '中 M' }, { v: 'L', lab: '低 L' }

    ];

    root.innerHTML = blocks.map(function (b) {
      var optsHtml;
      if (b.dim === 'riskType') {

          var c = countForGroup('riskType', o.v);
          return '<label><input type="checkbox" data-dim="riskType" value="' + o.v + '" ' +

        }).join('');
      } else if (b.dim === 'level') {
        optsHtml = b.opts.map(function (o) {
          var c = countForGroup('level', o.v);

            (state.filters.level.indexOf(o.v) >= 0 ? 'checked' : '') + '/> ' + o.lab + ' <span style="color:#888">(' + c + ')</span></label>';
        }).join('');
      } else {
        optsHtml = b.opts.map(function (o) {
          var c = countForGroup(b.dim, o);
          return '<label><input type="checkbox" data-dim="' + b.dim + '" value="' + o + '" ' +
            (state.filters[b.dim].indexOf(o) >= 0 ? 'checked' : '') + '/> ' + o + ' <span style="color:#888">(' + c + ')</span></label>';
        }).join('');
      }
      return '<div class="filter-block" data-block="' + b.dim + '">' +
        '<div class="filter-title en">' + b.title + ' <small>' + b.zh + '</small></div>' +
        '<div class="filter-actions"><a class="js-sel-all" data-dim="' + b.dim + '">全选</a><a class="js-sel-none" data-dim="' + b.dim + '">全不选</a></div>' +
        '<div class="chk-list">' + optsHtml + '</div></div>';
    }).join('');

    root.querySelectorAll('input[type=checkbox]').forEach(function (inp) {
      inp.addEventListener('change', function () {
        var dim = inp.getAttribute('data-dim');
        var v = inp.value;
        var arr = state.filters[dim].slice();
        if (inp.checked) {
          if (arr.indexOf(v) === -1) arr.push(v);
        } else {
          arr = arr.filter(function (x) { return x !== v; });
        }
        state.filters[dim] = arr;
        renderFilterUI();
        refreshAll();
      });
    });
    root.querySelectorAll('.js-sel-all').forEach(function (a) {
      a.addEventListener('click', function (e) {
        e.preventDefault();
        var dim = a.getAttribute('data-dim');
        if (dim === 'businessLine') state.filters.businessLine = BUSINESS_LINES.slice();
        else if (dim === 'region') state.filters.region = REGIONS.slice();
        else if (dim === 'modelType') state.filters.modelType = MODEL_TYPES.slice();
        else if (dim === 'riskType') state.filters.riskType = RISK_TYPE_KEYS.slice();
        else if (dim === 'level') state.filters.level = ['H', 'M', 'L'];
        renderFilterUI();
        refreshAll();
      });
    });
    root.querySelectorAll('.js-sel-none').forEach(function (a) {
      a.addEventListener('click', function (e) {
        e.preventDefault();
        var dim = a.getAttribute('data-dim');
        state.filters[dim] = [];
        renderFilterUI();
        refreshAll();
      });
    });

    var col = colorByScore(R);

  function aggregateCell(rt, bl, ms) {
    var cell = ms.filter(function (m) { return m.riskType === rt && m.businessLine === bl; });
    if (!cell.length) return null;
    var avg = function (fn) {
      var s = 0; cell.forEach(function (m) { s += fn(m); });
      return s / cell.length;
    };
    var avgR = avg(function (m) { return m.R_score; });
    var avgE = avg(function (m) { return m.E_score; });
    var avgP = avg(function (m) { return m.P_score; });
    var avgI = avg(function (m) { return m.I_score; });
    var lv = levelFromR(avgR);
    return {
      models: cell,
      count: cell.length,
      avgR: avgR,
      avgE: avgE,
      avgP: avgP,
      avgI: avgI,
      level: lv,
      names: cell.map(function (m) { return m.name; })
    };
  }

  function renderHeatmap(ms) {
    var wrap = document.getElementById('view-heat');
    var lines = {};
    ms.forEach(function (m) { lines[m.businessLine] = true; });
    var cols = BUSINESS_LINES.filter(function (b) { return lines[b]; });
    if (!cols.length) {
      wrap.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-hint);">当前筛选下无可用业务线列，请调整筛选条件。</div>';
      document.getElementById('heat-insight').textContent = '';
      return;
    }

    var nCol = cols.length;
    var gridCols = '120px';
    for (var i = 0; i < nCol; i++) gridCols += ' 1fr';

    var cells = [];
    var maxR = -1;
    var maxKey = '';
    RISK_TYPES.forEach(function (rt) {
      cols.forEach(function (bl) {
        var ag = aggregateCell(rt.key, bl, ms);
        var key = rt.key + '|' + bl;
        if (ag && ag.avgR > maxR) { maxR = ag.avgR; maxKey = key; }
        cells.push({ key: key, rt: rt, bl: bl, ag: ag });
      });
    });

    var html = '<div class="heat-table" style="grid-template-columns:' + gridCols + '">';
    html += '<div class="heat-corner en">RISK \\ BIZ</div>';
    cols.forEach(function (bl) {
      html += '<div class="heat-col-h">' + bl + '</div>';
    });
    RISK_TYPES.forEach(function (rt) {
      html += '<div class="heat-row-h">' + rt.label + '<br/><span class="en">(' + rt.code + ')</span></div>';
      cols.forEach(function (bl) {
        var key = rt.key + '|' + bl;
        var ag = aggregateCell(rt.key, bl, ms);
        if (!ag) {
          html += '<div class="heat-cell empty" data-key="' + key + '"><span class="heat-big">—</span><div class="heat-meta">无模型</div></div>';
        } else {
          var sel = state.selectedCellKey === key && !state.selectedModelId ? ' selected' : '';
          var star = (key === maxKey && ag.count) ? '<span class="star">★</span>' : '';
          var hst = heatCellStyle(ag.avgR);
          html += '<div class="heat-cell level-' + ag.level + sel + '" data-key="' + key + '" style="' + hst + '" tabindex="0">' +
            star +
            '<span class="heat-big">' + ag.avgR.toFixed(0) + '</span>' +
            '<div class="heat-tag ' + ag.level + '">' + (ag.level === 'H' ? '高 H' : ag.level === 'M' ? '中 M' : '低 L') + '</div>' +
            '<div class="heat-meta">模型数 ' + ag.count + '</div></div>';
        }
      });
    });
    html += '</div>';
    wrap.innerHTML = html;

    wrap.querySelectorAll('.heat-cell:not(.empty)').forEach(function (cell) {
      cell.addEventListener('click', function () {
        state.selectedCellKey = cell.getAttribute('data-key');
        state.selectedModelId = null;
        state.rightTab = 'detail';
        updateRightTabs();
        renderHeatmap(ms);
        renderRightPanel();
        syncTableActive();
      });
      cell.addEventListener('mouseenter', function (ev) { showCellTooltip(ev, cell.getAttribute('data-key'), ms); });
      cell.addEventListener('mousemove', function (ev) { moveTooltip(ev); });
      cell.addEventListener('mouseleave', hideTooltip);
    });

    var highCells = cells.filter(function (c) { return c.ag && c.ag.level === 'H'; }).length;
    var peak = maxR >= 0 ? maxR.toFixed(0) : '—';
    document.getElementById('heat-insight').textContent =
      ms.length ? ('当前 ' + highCells + ' 个高风险格（H），峰值评分 ' + peak + '。') : '';
  }

  var ttEl = document.getElementById('tt');
  function showCellTooltip(ev, key, ms) {
    var parts = key.split('|');
    var ag = aggregateCell(parts[0], parts[1], ms);
    if (!ag) return;
    var rtl = RISK_TYPES.filter(function (x) { return x.key === parts[0]; })[0];
    var title = (rtl ? rtl.label + ' (' + rtl.code + ')' : parts[0]) + ' × ' + parts[1];
    var names = ag.names.slice(0, 6).join('、') + (ag.names.length > 6 ? ' 等' : '');
    ttEl.style.display = 'block';
    ttEl.innerHTML =
      '<div class="t-title">' + title + '</div>' +
      '<div class="t-row">综合 R（格内均值）: ' + ag.avgR.toFixed(1) + '</div>' +
      '<div class="t-row">E=' + ag.avgE.toFixed(1) + ' · P=' + ag.avgP.toFixed(1) + ' · I=' + ag.avgI.toFixed(1) + '</div>' +
      '<div class="t-row">涉及模型: ' + names + '</div>';
    moveTooltip(ev);
  }
  function moveTooltip(ev) {
    ttEl.style.left = (ev.clientX + 14) + 'px';
    ttEl.style.top = (ev.clientY + 14) + 'px';
  }
  function hideTooltip() { ttEl.style.display = 'none'; }

  function renderBizChart(ms) {
    var c = ensureChart('chart-biz', 'biz');
    if (!c) return;
    var map = {};
    ms.forEach(function (m) {
      if (!map[m.businessLine]) map[m.businessLine] = { s: 0, n: 0 };
      map[m.businessLine].s += m.R_score;
      map[m.businessLine].n++;
    });

          return d.name + '<br/>平均 R: ' + d.value + '<br/>模型数: ' + d.count;
        }
      },
      xAxis: { type: 'category', data: cats, axisLabel: { color: '#8ea8bd', interval: 0, rotate: cats.length > 4 ? 25 : 0 } },
      yAxis: { type: 'value', name: '平均 R', max: 100, splitLine: { lineStyle: { color: 'rgba(47,140,255,0.12)' } } },

  function renderRegionChart(ms) {
    var c = ensureChart('chart-region', 'region');
    if (!c) return;

      map[m.region].n++;

    var cats = REGIONS;
    var vals = cats.map(function (r) {

      grid: { left: 48, right: 24, top: 32, bottom: 40 },

        formatter: function (p) {

        }
      },

  function monthLabels() {
    var out = [];
    var y = 2025; var mo = 6;
    for (var i = 0; i < 12; i++) {
      out.push(y + '-' + String(mo).padStart(2, '0'));
      mo++;
      if (mo > 12) { mo = 1; y++; }
    }
    return out;
  }

  function renderTrendChart(ms) {
    var c = ensureChart('chart-trend', 'trend');
    if (!c) return;
    var lines = {};
    ms.forEach(function (m) { lines[m.businessLine] = true; });
    var seriesNames = BUSINESS_LINES.filter(function (b) { return lines[b]; });
    var months = monthLabels();
    if (!seriesNames.length) {
      c.setOption({ legend: { show: false }, xAxis: { type: 'category', data: months }, yAxis: { type: 'value', max: 100 }, series: [] }, true);
      return;
    }
    var base = {};
    seriesNames.forEach(function (name) {
      var sub = ms.filter(function (m) { return m.businessLine === name; });
      var b = sub.length ? sub.reduce(function (s, m) { return s + m.R_score; }, 0) / sub.length : 0;
      base[name] = b;
    });
    var series = seriesNames.map(function (name) {
      var data = months.map(function (_, i) {
        var wobble = 4 * Math.sin(i / 1.8) + (name.length % 3);
        return +clamp(base[name] + wobble, 0, 100).toFixed(1);
      });
      return { name: name, type: 'line', smooth: true, symbol: 'circle', symbolSize: 6, data: data };
    });
    c.setOption({
      color: ['#004F71', '#0097E0', '#85BB24', '#EE7623', '#43AF2A'],
      legend: { top: 4, textStyle: { color: '#4A4A4A' } },
      grid: { left: 48, right: 24, top: 40, bottom: 40 },
      tooltip: { trigger: 'axis' },
      xAxis: { type: 'category', data: months, axisLabel: { color: '#8ea8bd', rotate: 30 } },
      yAxis: { type: 'value', name: 'R', max: 100, splitLine: { lineStyle: { color: 'rgba(47,140,255,0.12)' } } },
      series: series
    }, true);
  }

  function animateKpi(to) {
    var dur = 1200;
    var t0 = performance.now();
    var from = { total: state.anim.total, high: state.anim.high, reserve: state.anim.reserve };
    function frame(t) {
      var p = Math.min(1, (t - t0) / dur);
      var ease = p * (2 - p);
      state.anim.total = from.total + (to.total - from.total) * ease;
      state.anim.high = from.high + (to.high - from.high) * ease;
      state.anim.reserve = from.reserve + (to.reserve - from.reserve) * ease;
      document.getElementById('kpi-total').textContent = Math.round(state.anim.total);
      document.getElementById('kpi-high').textContent = Math.round(state.anim.high);
      document.getElementById('kpi-reserve').textContent = Math.round(state.anim.reserve);
      if (p < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  function updateKPI(ms) {
    var high = ms.filter(function (m) { return m.R_score >= 80; }).length;
    var res = ms.reduce(function (s, m) { return s + m.capitalReserve; }, 0);
    animateKpi({ total: ms.length, high: high, reserve: res });
  }

    ['chart-biz', 'chart-region', 'chart-trend'].forEach(function (id) {
      var el = document.getElementById(id);
      el.classList.toggle('show', id === 'chart-' + tab && tab !== 'heat');

    var ms = getFilteredModels();
    if (tab === 'biz') { renderBizChart(ms); setTimeout(function () { charts.biz && charts.biz.resize(); }, 50); }
    if (tab === 'region') { renderRegionChart(ms); setTimeout(function () { charts.region && charts.region.resize(); }, 50); }

  }

  function actionsFor(level, rt) {
    var a = ['建立模型风险台账与责任矩阵（RACI）', '完善训练/推理数据血缘与版本冻结机制'];
    if (level === 'H') a.unshift('72 小时内召开跨部门治理例会并下达整改里程碑');
    if (rt === 'F') a.push('开展公平性回溯测试与分群差异监测（含替代特征敏感性分析）');
    if (rt === 'E') a.push('上线可解释性报告模板与客户/监管可读摘要');
    if (rt === 'T') a.push('对照《个保法》最小必要原则梳理字段清单与留存周期');
    if (rt === 'A') a.push('映射《EU AI Act》高风险义务与国内监管问询要点');
    return a;
  }

  function regCloud(rt) {
    var base = ['《个人信息保护法》', '《数据安全法》', '人民银行金融科技伦理指引'];
    if (rt === 'T') base.push('GDPR Art.22', 'PCI DSS（如适用）');
    if (rt === 'A') base.push('《EU AI Act》Art.9-15', '巴塞尔模型风险指引（SR 11-7 精神）');
    if (rt === 'F') base.push('ECOA/公平信贷原则（对标）', '算法歧视行政案例库');
    if (rt === 'E') base.push('模型卡（Model Card）披露规范');
    return base;
  }

      '<div id="chart-radar" class="radar-chart"></div>' +
      '<div class="section-title">三因子拆解（格内均值）</div>' +

    return {

      businessLine: document.getElementById('cf-bl').value,

  function wireCalc() {
    var ids = ['cf-name', 'cf-bl', 'cf-rg', 'cf-mt', 'cf-rt', 'cf-scale', 'cf-ef', 'cf-ec', 'cf-ea', 'cf-ph', 'cf-pb', 'cf-pr', 'cf-if', 'cf-il', 'cf-ir', 'cf-ix'];
    ids.forEach(function (id) {
      var el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('input', updateCalcOutputs);
      el.addEventListener('change', updateCalcOutputs);
    });
    document.querySelectorAll('.js-preg').forEach(function (b) {
      b.addEventListener('click', function () {
        var v = parseFloat(b.getAttribute('data-v'));
        document.getElementById('cf-pr').value = v;
        updateCalcOutputs();
      });
    });
    document.getElementById('btn-save-new').addEventListener('click', function () {
      var raw = calcFormModel();
      var m = fullModel(raw);
      var maxn = 0;
      state.models.forEach(function (x) {
        var n = parseInt(String(x.id).replace(/\D/g, ''), 10);
        if (!isNaN(n) && n > maxn) maxn = n;
      });
      m.id = 'M' + String(maxn + 1).padStart(3, '0');
      state.models.push(m);
      saveModels();
      state.selectedModelId = m.id;
      state.selectedCellKey = m.riskType + '|' + m.businessLine;
      state.rightTab = 'detail';
      state.editingId = null;
      refreshAll();
    });
    document.getElementById('btn-update-existing').addEventListener('click', function () {
      if (!state.editingId) return alert('请先从表格点「编辑」或在列表中选择已有模型。');
      var raw = calcFormModel();
      raw.id = state.editingId;
      var m = fullModel(raw);
      var idx = state.models.findIndex(function (x) { return x.id === m.id; });
      if (idx >= 0) state.models[idx] = m;
      saveModels();
      refreshAll();
    });
  }

  function updateCalcOutputs() {
    var raw = calcFormModel();
    var m = fullModel(raw);
    document.getElementById('out-e').textContent = m.E_score.toFixed(1);
    document.getElementById('out-p').textContent = m.P_score.toFixed(1);
    document.getElementById('out-i').textContent = m.I_score.toFixed(1);
    document.getElementById('out-r').textContent = m.R_score.toFixed(1);
    var tag = document.getElementById('out-lv');
    tag.className = 'tag-level ' + m.level;
    tag.textContent = m.level === 'H' ? '高 H' : m.level === 'M' ? '中 M' : '低 L';
    document.getElementById('out-cap').textContent = Math.round(m.capitalReserve);
    var formEl = document.getElementById('out-cap-form');
    if (formEl) formEl.textContent = reserveFormulaNote(m.scale, m.R_score, m.level);
    var one = '该模型属于' + (m.level === 'H' ? '高风险 H 级，建议立即纳入 Quick Win 治理清单' : m.level === 'M' ? '中风险 M 级，建议分阶段推进并安排抽检' : '低风险 L 级，建议长效观察与年度复盘') + '。';
    document.getElementById('out-one').textContent = one;
    var mc = ensureChart('chart-mini', 'mini');
    if (mc) {
      mc.setOption({
        grid: { left: 40, right: 12, top: 16, bottom: 28 },
        xAxis: { type: 'category', data: ['E', 'P', 'I'], axisLabel: { color: '#8ea8bd' } },
        yAxis: { type: 'value', max: 100, splitLine: { lineStyle: { color: 'rgba(47,140,255,0.12)' } } },
        series: [{
          type: 'bar',
          data: [
            { value: m.E_score, itemStyle: { color: '#2f8cff' } },
            { value: m.P_score, itemStyle: { color: '#22d3ee' } },
            { value: m.I_score, itemStyle: { color: '#86BC25' } }
          ],
          barWidth: 26
        }]
      }, true);
    }
  }

  function updateRightTabs() {
    document.querySelectorAll('.rtabs button').forEach(function (b) {
      b.classList.toggle('active', b.getAttribute('data-rtab') === state.rightTab);
    });
  }

  function renderRightPanel() {
    var box = document.getElementById('right-body');
    if (state.rightTab === 'calc') {
      disposeChart('mini');
      disposeChart('radar');
      box.innerHTML = renderCalculatorShell();
      document.getElementById('cf-scale').addEventListener('input', function () {
        document.getElementById('cf-sv').textContent = (+document.getElementById('cf-scale').value).toFixed(1);
        updateCalcOutputs();
      });
      ['cf-ef', 'cf-ec', 'cf-ea'].forEach(function (id) {
        document.getElementById(id).addEventListener('input', wireRangeLabels);
      });
      wireCalc();
      updateCalcOutputs();
      return;
    }

    disposeChart('mini');
    disposeChart('radar');
    var ms = getFilteredModels();
    var html = '';
    var m = state.selectedModelId ? state.models.filter(function (x) { return x.id === state.selectedModelId; })[0] : null;
    if (m) {
      html = renderDetailModel(m);
    } else if (state.selectedCellKey) {
      var ck = state.selectedCellKey.split('|');
      var ag = aggregateCell(ck[0], ck[1], ms);
      if (ag) html = renderDetailAggregate(ag);
      else html = '<p>该格在当前筛选下无模型，请点击热力图其他格子或放宽筛选。</p>';
    } else {
      html = '<p>请点击热力图格子或表格行查看详情。</p>';
    }
    box.innerHTML = html;
    var fac = getDetailFactors();
    if (fac) setTimeout(function () { renderEPIRadar(fac.e, fac.p, fac.i); }, 50);
    else disposeChart('radar');
  }

  function syncTableActive() {
    document.querySelectorAll('#model-table tbody tr').forEach(function (tr) {
      tr.classList.toggle('active', tr.getAttribute('data-id') === state.selectedModelId);
    });
  }

  function sortModels(list) {
    var k = state.tableSort.key;
    var dir = state.tableSort.dir === 'asc' ? 1 : -1;
    return list.slice().sort(function (a, b) {
      var va = a[k]; var vb = b[k];
      if (typeof va === 'string') return va.localeCompare(vb, 'zh-CN') * dir;
      return (va - vb) * dir;
    });
  }

  function renderTable() {
    var thead = document.querySelector('#model-table thead');
    var tbody = document.querySelector('#model-table tbody');
    var cols = [
      { k: 'id', l: '模型ID' },
      { k: 'name', l: '模型名称' },
      { k: 'businessLine', l: '业务线' },
      { k: 'region', l: '地区' },
      { k: 'modelType', l: '模型类型' },
      { k: 'E_score', l: 'E分' },
      { k: 'P_score', l: 'P分' },
      { k: 'I_score', l: 'I分' },
      { k: 'R_score', l: '综合R' },
      { k: 'level', l: '等级' },
      { k: 'capitalReserve', l: '建议拨备(万元)' },
      { k: '_op', l: '操作' }
    ];
    thead.innerHTML = '<tr>' + cols.map(function (c) {
      if (c.k === '_op') return '<th>' + c.l + '</th>';
      return '<th data-sort="' + c.k + '">' + c.l + (state.tableSort.key === c.k ? (state.tableSort.dir === 'asc' ? ' ▲' : ' ▼') : '') + '</th>';
    }).join('') + '</tr>';

    var rows = sortModels(getFilteredModels());
    tbody.innerHTML = rows.map(function (m) {
      return '<tr data-id="' + m.id + '">' +
        '<td>' + m.id + '</td>' +
        '<td>' + m.name + '</td>' +
        '<td>' + m.businessLine + '</td>' +
        '<td>' + m.region + '</td>' +
        '<td>' + m.modelType + '</td>' +
        '<td>' + m.E_score.toFixed(1) + '</td>' +
        '<td>' + m.P_score.toFixed(1) + '</td>' +
        '<td>' + m.I_score.toFixed(1) + '</td>' +
        '<td class="num-r" style="color:' + colorByScore(m.R_score) + '">' + m.R_score.toFixed(1) + '</td>' +
        '<td class="lvl-dot ' + m.level + '">' + m.level + '</td>' +
        '<td>' + Math.round(m.capitalReserve) + '</td>' +
        '<td><a href="#" class="js-edit" data-id="' + m.id + '">编辑</a> · <a href="#" class="js-del" data-id="' + m.id + '">删除</a></td>' +
        '</tr>';
    }).join('');

    thead.querySelectorAll('th[data-sort]').forEach(function (th) {
      th.addEventListener('click', function () {
        var key = th.getAttribute('data-sort');
        if (state.tableSort.key === key) state.tableSort.dir = state.tableSort.dir === 'asc' ? 'desc' : 'asc';
        else { state.tableSort.key = key; state.tableSort.dir = 'desc'; }
        renderTable();
      });
    });

    tbody.querySelectorAll('tr').forEach(function (tr) {
      tr.addEventListener('click', function (e) {
        if (e.target.classList.contains('js-edit') || e.target.classList.contains('js-del')) return;
        var id = tr.getAttribute('data-id');
        state.selectedModelId = id;
        state.selectedCellKey = null;
        var mm = state.models.filter(function (x) { return x.id === id; })[0];
        if (mm) state.selectedCellKey = mm.riskType + '|' + mm.businessLine;
        state.rightTab = 'detail';
        updateRightTabs();
        renderRightPanel();
        syncTableActive();
      });
    });
    tbody.querySelectorAll('.js-edit').forEach(function (a) {
      a.addEventListener('click', function (e) {
        e.preventDefault(); e.stopPropagation();
        var id = a.getAttribute('data-id');
        var mm = state.models.filter(function (x) { return x.id === id; })[0];
        state.selectedModelId = id;
        openCalculator(mm, id);
      });
    });
    tbody.querySelectorAll('.js-del').forEach(function (a) {
      a.addEventListener('click', function (e) {
        e.preventDefault(); e.stopPropagation();
        var id = a.getAttribute('data-id');
        if (!confirm('确认删除模型 ' + id + ' ?')) return;
        state.models = state.models.filter(function (x) { return x.id !== id; });
        saveModels();
        if (state.selectedModelId === id) state.selectedModelId = null;
        refreshAll();
      });
    });
    syncTableActive();
  }

  function exportCSV() {
    var rows = sortModels(state.models);
    var header = ['id', 'name', 'businessLine', 'region', 'modelType', 'riskType', 'scale', 'E_freq', 'E_coverage', 'E_amount', 'P_history', 'P_bias', 'P_regulation', 'I_fine', 'I_ltv', 'I_reputation', 'I_remediation', 'E_score', 'P_score', 'I_score', 'R_score', 'level', 'capitalReserve'];
    var esc = function (s) { return '"' + String(s).replace(/"/g, '""') + '"'; };
    var lines = [header.join(',')].concat(rows.map(function (m) {
      return header.map(function (h) { return esc(m[h]); }).join(',');
    }));
    var blob = new Blob(['\ufeff' + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'xbank-ai-models.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  function refreshAll() {
    state.models = state.models.map(function (m) { return fullModel(m); });
    var ms = getFilteredModels();
    document.getElementById('empty-viz').classList.toggle('show', ms.length === 0);
    renderHeatmap(ms);
    updateKPI(ms);
    if (state.midTab !== 'heat') switchMidTab(state.midTab);
    renderTable();
    if (state.rightTab === 'detail') renderRightPanel();
    else if (state.rightTab === 'calc') renderRightPanel();
  }

  function bindGlobals() {
    document.getElementById('btn-reset-filters').addEventListener('click', function () {
      initFiltersState();
      renderFilterUI();
      refreshAll();
    });
    document.querySelectorAll('#mid-tabs button').forEach(function (b) {
      b.addEventListener('click', function () { switchMidTab(b.getAttribute('data-tab')); });
    });
    document.querySelectorAll('.rtabs button').forEach(function (b) {
      b.addEventListener('click', function () {
        state.rightTab = b.getAttribute('data-rtab');
        updateRightTabs();
        if (state.rightTab === 'calc') openCalculator(null, null);
        else renderRightPanel();
      });
    });
    document.getElementById('bottom-toggle').addEventListener('click', function () {
      state.bottomOpen = !state.bottomOpen;
      document.getElementById('bottom-body').classList.toggle('open', state.bottomOpen);
      document.getElementById('bottom-arrow').textContent = state.bottomOpen ? '▲' : '▼';
    });
    document.getElementById('btn-add-model').addEventListener('click', function () {
      state.selectedModelId = null;
      openCalculator(null, null);
    });
    document.getElementById('btn-export-csv').addEventListener('click', exportCSV);
    var demoBtn = document.getElementById('btn-demo');
    if (demoBtn) demoBtn.addEventListener('click', runDemoMode);
    window.addEventListener('resize', function () {
      Object.keys(charts).forEach(function (k) { charts[k] && charts[k].resize(); });
    });
  }

  function init() {
    initFiltersState();
    state.models = loadModels().map(function (m) { return fullModel(m); });
    state.selectedCellKey = 'F|信贷审批';
    state.selectedModelId = null;
    state.rightTab = 'detail';
    renderFilterUI();
    bindGlobals();
    refreshAll();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
